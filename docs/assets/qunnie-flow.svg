<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" preserveAspectRatio="xMidYMid meet" fill="none" role="img" aria-label="Ask Qunnie flow: describe in English, Qunnie reasons in a ReAct loop, proposes a graph edit, you approve or reject, then it lands on the canvas and runs">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#0B0F17"/>
      <stop offset="1" stop-color="#070A11"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>text{font-family:'Segoe UI',system-ui,Arial,sans-serif}</style>

  <rect x="1" y="1" width="1198" height="438" rx="22" fill="url(#bg)" stroke="#19212F" stroke-width="1.5"/>
  <ellipse cx="430" cy="200" rx="460" ry="220" fill="url(#glow)"/>

  <!-- ===================== 1 · You ask ===================== -->
  <g>
    <rect x="40" y="150" width="200" height="150" rx="16" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="40" y="150" width="6" height="150" rx="3" fill="#2DD4BF"/>
    <circle cx="74" cy="186" r="15" fill="#2DD4BF"/><text x="74" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#06121B">1</text>
    <text x="98" y="191" font-size="15" font-weight="700" fill="#E7EEFC">You ask</text>
    <rect x="60" y="212" width="160" height="60" rx="10" fill="#0E1623" stroke="#22304A"/>
    <text x="74" y="234" font-size="10.5" fill="#9FB6DC">"read orders.csv,</text>
    <text x="74" y="250" font-size="10.5" fill="#9FB6DC"> filter status =</text>
    <text x="74" y="266" font-size="10.5" fill="#9FB6DC"> 'paid', write parquet"</text>
    <text x="60" y="292" font-size="10.5" font-weight="600" fill="#5EEAD4">plain English</text>
  </g>

  <!-- 1 -> 2 -->
  <g stroke="#2A364C" stroke-width="2" fill="none"><line x1="240" y1="225" x2="284" y2="225"/></g>
  <path d="M280 220 L288 225 L280 230 Z" fill="#3A4A66"/>
  <circle r="4" fill="#2DD4BF"><animate attributeName="cx" values="240;288" dur="1.5s" repeatCount="indefinite"/><animate attributeName="cy" values="225;225" dur="1.5s" repeatCount="indefinite"/></circle>

  <!-- ===================== 2 · ReAct loop ===================== -->
  <g>
    <rect x="290" y="150" width="220" height="150" rx="16" fill="#0E1623" stroke="url(#aurora)" stroke-width="2"/>
    <circle cx="324" cy="186" r="15" fill="#38BDF8"/><text x="324" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#06121B">2</text>
    <text x="348" y="186" font-size="15" font-weight="700" fill="#E7EEFC">Qunnie reasons</text>
    <text x="348" y="203" font-size="10.5" fill="#8A97AE">bounded ReAct loop</text>
    <!-- loop ring -->
    <g transform="translate(400,250)">
      <circle r="34" fill="none" stroke="#2A3850" stroke-width="2"/>
      <path d="M0 -34 A 34 34 0 1 1 -29.4 17" fill="none" stroke="url(#aurora)" stroke-width="3" stroke-linecap="round"/>
      <path d="M-33 11 L-29 18 L-22 14 Z" fill="#A855F7"/>
    </g>
    <text x="318" y="247" font-size="10" fill="#A9BCE0">think</text>
    <text x="450" y="247" font-size="10" fill="#A9BCE0">tool</text>
    <text x="318" y="285" font-size="10" fill="#A9BCE0">answer</text>
    <text x="448" y="285" font-size="10" fill="#A9BCE0">read</text>
  </g>

  <!-- 2 -> 3 -->
  <g stroke="#2A364C" stroke-width="2" fill="none"><line x1="510" y1="225" x2="554" y2="225"/></g>
  <path d="M550 220 L558 225 L550 230 Z" fill="#3A4A66"/>
  <circle r="4" fill="#6366F1"><animate attributeName="cx" values="510;558" dur="1.5s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="cy" values="225;225" dur="1.5s" begin="0.3s" repeatCount="indefinite"/></circle>

  <!-- ===================== 3 · Proposes ===================== -->
  <g>
    <rect x="560" y="150" width="200" height="150" rx="16" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="560" y="150" width="6" height="150" rx="3" fill="#6366F1"/>
    <circle cx="594" cy="186" r="15" fill="#6366F1"/><text x="594" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">3</text>
    <text x="618" y="191" font-size="15" font-weight="700" fill="#E7EEFC">Proposes</text>
    <rect x="580" y="212" width="160" height="60" rx="10" fill="#0E1623" stroke="#22304A"/>
    <text x="594" y="232" font-size="10" fill="#7DD3FC">{ add: src.csv,</text>
    <text x="594" y="247" font-size="10" fill="#7DD3FC">  add: xf.filter,</text>
    <text x="594" y="262" font-size="10" fill="#7DD3FC">  connect: … }</text>
    <text x="580" y="292" font-size="10.5" font-weight="600" fill="#A5B4FC">graph edit · validated</text>
  </g>

  <!-- 3 -> 4 -->
  <g stroke="#2A364C" stroke-width="2" fill="none"><line x1="760" y1="225" x2="804" y2="225"/></g>
  <path d="M800 220 L808 225 L800 230 Z" fill="#3A4A66"/>
  <circle r="4" fill="#8B5CF6"><animate attributeName="cx" values="760;808" dur="1.5s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="cy" values="225;225" dur="1.5s" begin="0.6s" repeatCount="indefinite"/></circle>

  <!-- ===================== 4 · You decide (HITL) ===================== -->
  <g>
    <rect x="810" y="150" width="160" height="150" rx="16" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="810" y="150" width="6" height="150" rx="3" fill="#8B5CF6"/>
    <circle cx="844" cy="186" r="15" fill="#8B5CF6"/><text x="844" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">4</text>
    <text x="868" y="191" font-size="14.5" font-weight="700" fill="#E7EEFC">You decide</text>
    <rect x="830" y="214" width="120" height="30" rx="8" fill="#0E2A1E" stroke="#34D399"/>
    <text x="890" y="234" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5EEAD4">✓ Approve</text>
    <rect x="830" y="250" width="120" height="30" rx="8" fill="#2A1418" stroke="#F87171"/>
    <text x="890" y="270" text-anchor="middle" font-size="11.5" font-weight="700" fill="#FCA5A5">✕ Reject</text>
    <text x="824" y="297" font-size="9.5" font-weight="600" fill="#C4B5FD">human-in-the-loop gate</text>
  </g>

  <!-- 4 -> 5 (approve path) -->
  <g stroke="#34D399" stroke-width="2" fill="none"><line x1="970" y1="225" x2="1014" y2="225"/></g>
  <path d="M1010 220 L1018 225 L1010 230 Z" fill="#34D399"/>
  <circle r="4" fill="#34D399"><animate attributeName="cx" values="970;1018" dur="1.5s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="cy" values="225;225" dur="1.5s" begin="0.9s" repeatCount="indefinite"/></circle>

  <!-- ===================== 5 · Canvas + run ===================== -->
  <g>
    <rect x="1020" y="150" width="144" height="150" rx="16" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="1020" y="150" width="6" height="150" rx="3" fill="#A855F7"/>
    <circle cx="1054" cy="186" r="15" fill="#A855F7"/><text x="1054" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">5</text>
    <text x="1078" y="191" font-size="13.5" font-weight="700" fill="#E7EEFC">On canvas</text>
    <!-- mini nodes -->
    <rect x="1038" y="214" width="30" height="22" rx="6" fill="#101A2A" stroke="#2DD4BF"/>
    <rect x="1080" y="214" width="30" height="22" rx="6" fill="#101A2A" stroke="#6366F1"/>
    <rect x="1122" y="214" width="26" height="22" rx="6" fill="#101A2A" stroke="#A855F7"/>
    <line x1="1068" y1="225" x2="1080" y2="225" stroke="#2E3C58" stroke-width="1.5"/>
    <line x1="1110" y1="225" x2="1122" y2="225" stroke="#2E3C58" stroke-width="1.5"/>
    <rect x="1038" y="250" width="110" height="26" rx="8" fill="url(#aurora)"/>
    <text x="1093" y="267" text-anchor="middle" font-size="11" font-weight="800" fill="#06121B">▶ Run</text>
    <text x="1034" y="296" font-size="9.5" font-weight="600" fill="#D8B4FE">one-click insert</text>
  </g>

  <!-- ===================== top + bottom captions ===================== -->
  <text x="40" y="60" font-size="13" font-weight="700" letter-spacing="0.06em" fill="#7E8AA3">ASK QUNNIE — FROM A SENTENCE TO A RUNNING PIPELINE</text>

  <line x1="40" y1="350" x2="1160" y2="350" stroke="#172033" stroke-width="1"/>
  <g>
    <circle cx="56" cy="388" r="6" fill="#38BDF8"/>
    <text x="72" y="384" font-size="12" font-weight="700" fill="#E7EEFC">Safe by design</text>
    <text x="72" y="402" font-size="10.5" fill="#8A97AE">graph + tool results treated as untrusted data · proposals validated against the live graph · loop cap · nothing mutates the canvas without approval</text>
  </g>
  <text x="880" y="392" font-size="10.5" fill="#6B7790">local model or any provider you point it at</text>
</svg>
