<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid meet" fill="none" role="img" aria-label="Quilt - pipelines you can see, data that stays yours">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#0B0F17"/>
      <stop offset="1" stop-color="#070A11"/>
    </linearGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EAF1FF"/>
      <stop offset="1" stop-color="#A9C2E6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="1" y="1" width="1198" height="298" rx="26" fill="url(#bg)" stroke="#19212F" stroke-width="1.5"/>
  <ellipse cx="930" cy="150" rx="340" ry="220" fill="url(#glow)"/>

  <!-- logo mark: Quilt patchwork (2x2 cool tiles) woven by two curved stitch threads -->
  <g transform="translate(56,48) scale(0.34375)">
    <rect x="16" y="16" width="106" height="106" rx="26" fill="#2DD4BF"/>
    <rect x="134" y="16" width="106" height="106" rx="26" fill="#38BDF8"/>
    <rect x="16" y="134" width="106" height="106" rx="26" fill="#A855F7"/>
    <rect x="134" y="134" width="106" height="106" rx="26" fill="#6366F1"/>
    <g stroke="#FFFFFF" stroke-opacity="0.95" stroke-width="7" stroke-linecap="round" fill="none" stroke-dasharray="11 10">
      <path d="M26 128 C 70 94, 92 162, 128 128 S 188 94, 230 128"/>
      <path d="M128 26 C 94 70, 162 92, 128 128 S 94 188, 128 230"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="162" y="112" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#wm)">Quilt</text>

  <!-- tagline + subtitle -->
  <text x="58" y="178" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="24" font-weight="700" fill="#CFE0FF">Pipelines you can see. Data that stays yours.</text>
  <text x="58" y="212" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="15.5" font-weight="400" fill="#8A97AE">Offline-first visual ETL with an on-device AI. Read files, databases,</text>
  <text x="58" y="234" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="15.5" font-weight="400" fill="#8A97AE">and the cloud, reshape with 127 transforms, land clean data anywhere.</text>
  <text x="58" y="262" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="13" font-weight="600" fill="#5E6B82">~65 MB desktop app · no servers · runs on DuckDB</text>

  <!-- flow on the right: Sources -> Quilt -> Sinks -->
  <g font-family="'Segoe UI', system-ui, Arial, sans-serif">
    <line x1="788" y1="150" x2="828" y2="150" stroke="#2A364C" stroke-width="2.5"/>
    <line x1="998" y1="150" x2="1038" y2="150" stroke="#2A364C" stroke-width="2.5"/>
    <circle r="4.5" fill="#2DD4BF"><animate attributeName="cx" values="788;828" dur="1.5s" repeatCount="indefinite"/><animate attributeName="cy" values="150;150" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle r="4.5" fill="#A855F7"><animate attributeName="cx" values="998;1038" dur="1.5s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="cy" values="150;150" dur="1.5s" begin="0.4s" repeatCount="indefinite"/></circle>

    <!-- Sources -->
    <rect x="640" y="106" width="148" height="88" rx="14" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="640" y="106" width="5" height="88" rx="2.5" fill="#2DD4BF"/>
    <text x="662" y="138" font-size="16" font-weight="700" fill="#E7EEFC">Sources</text>
    <text x="662" y="160" font-size="12.5" fill="#8090AD">files · databases</text>
    <text x="662" y="178" font-size="12.5" fill="#8090AD">cloud · APIs</text>

    <!-- Quilt core -->
    <rect x="828" y="106" width="170" height="88" rx="14" fill="#101725" stroke="url(#aurora)" stroke-width="2"/>
    <rect x="828" y="106" width="5" height="88" rx="2.5" fill="#6366F1"/>
    <text x="850" y="138" font-size="16" font-weight="700" fill="#E7EEFC">Transform</text>
    <text x="850" y="160" font-size="12.5" fill="#A9BCE0">filter · join · window</text>
    <text x="850" y="178" font-size="12.5" fill="#A9BCE0">aggregate · validate</text>

    <!-- Sinks -->
    <rect x="1038" y="106" width="126" height="88" rx="14" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="1038" y="106" width="5" height="88" rx="2.5" fill="#A855F7"/>
    <text x="1060" y="138" font-size="16" font-weight="700" fill="#E7EEFC">Sinks</text>
    <text x="1060" y="160" font-size="12.5" fill="#8090AD">files · DBs</text>
    <text x="1060" y="178" font-size="12.5" fill="#8090AD">AI / vector</text>
  </g>
</svg>
