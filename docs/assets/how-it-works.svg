<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" preserveAspectRatio="xMidYMid meet" fill="none" role="img" aria-label="How Quilt works: open a workspace, design, compile to SQL, run on DuckDB, land and ship">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#0B0F17"/>
      <stop offset="1" stop-color="#070A11"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>text{font-family:'Segoe UI',system-ui,Arial,sans-serif}</style>

  <rect x="1" y="1" width="1198" height="468" rx="22" fill="url(#bg)" stroke="#19212F" stroke-width="1.5"/>
  <ellipse cx="600" cy="235" rx="520" ry="240" fill="url(#glow)"/>

  <!-- ============ AI loop chip (feeds step 2) ============ -->
  <g>
    <rect x="300" y="60" width="170" height="46" rx="12" fill="#0E1623" stroke="url(#aurora)" stroke-width="1.5"/>
    <circle cx="324" cy="83" r="9" fill="#38BDF8"/>
    <text x="320" y="88" font-size="13" font-weight="800" fill="#06121B">✦</text>
    <text x="342" y="79" font-size="13" font-weight="700" fill="#E7EEFC">Ask Qunnie</text>
    <text x="342" y="95" font-size="10.5" fill="#8A97AE">plain-English → pipeline</text>
    <!-- arrow down into step 2 -->
    <line x1="385" y1="106" x2="385" y2="146" stroke="#38BDF8" stroke-width="1.8" stroke-dasharray="5 5"/>
    <path d="M381 140 L385 148 L389 140 Z" fill="#38BDF8"/>
  </g>

  <!-- ============ step cards ============ -->
  <!-- card 1 -->
  <g>
    <rect x="40" y="150" width="200" height="170" rx="16" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="40" y="150" width="6" height="170" rx="3" fill="#2DD4BF"/>
    <circle cx="74" cy="186" r="15" fill="#2DD4BF"/><text x="74" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#06121B">1</text>
    <text x="98" y="191" font-size="15.5" font-weight="700" fill="#E7EEFC">Open workspace</text>
    <text x="60" y="228" font-size="12" fill="#8A97AE">Pick a folder. Pipelines,</text>
    <text x="60" y="248" font-size="12" fill="#8A97AE">connections, contexts and</text>
    <text x="60" y="268" font-size="12" fill="#8A97AE">routines live as plain files.</text>
    <text x="60" y="298" font-size="11" font-weight="600" fill="#5EEAD4">git-friendly · yours</text>
  </g>

  <!-- card 2 -->
  <g>
    <rect x="270" y="150" width="200" height="170" rx="16" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="270" y="150" width="6" height="170" rx="3" fill="#38BDF8"/>
    <circle cx="304" cy="186" r="15" fill="#38BDF8"/><text x="304" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#06121B">2</text>
    <text x="328" y="191" font-size="15.5" font-weight="700" fill="#E7EEFC">Design</text>
    <text x="290" y="228" font-size="12" fill="#8A97AE">Drag sources, transforms,</text>
    <text x="290" y="248" font-size="12" fill="#8A97AE">validators and sinks — or</text>
    <text x="290" y="268" font-size="12" fill="#8A97AE">just describe it to Qunnie.</text>
    <text x="290" y="298" font-size="11" font-weight="600" fill="#7DD3FC">drag &amp; wire · or AI</text>
  </g>

  <!-- card 3 -->
  <g>
    <rect x="500" y="150" width="200" height="170" rx="16" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="500" y="150" width="6" height="170" rx="3" fill="#6366F1"/>
    <circle cx="534" cy="186" r="15" fill="#6366F1"/><text x="534" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">3</text>
    <text x="558" y="191" font-size="15.5" font-weight="700" fill="#E7EEFC">Compile</text>
    <text x="520" y="228" font-size="12" fill="#8A97AE">The graph compiles to</text>
    <text x="520" y="248" font-size="12" fill="#8A97AE">readable SQL you can</text>
    <text x="520" y="268" font-size="12" fill="#8A97AE">inspect on every node.</text>
    <text x="520" y="298" font-size="11" font-weight="600" fill="#A5B4FC">no black box</text>
  </g>

  <!-- card 4 -->
  <g>
    <rect x="730" y="150" width="200" height="170" rx="16" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="730" y="150" width="6" height="170" rx="3" fill="#8B5CF6"/>
    <circle cx="764" cy="186" r="15" fill="#8B5CF6"/><text x="764" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">4</text>
    <text x="788" y="191" font-size="15.5" font-weight="700" fill="#E7EEFC">Run</text>
    <text x="750" y="228" font-size="12" fill="#8A97AE">DuckDB executes locally:</text>
    <text x="750" y="248" font-size="12" fill="#8A97AE">vectorized, columnar,</text>
    <text x="750" y="268" font-size="12" fill="#8A97AE">at native speed.</text>
    <text x="750" y="298" font-size="11" font-weight="600" fill="#C4B5FD">live row counts</text>
  </g>

  <!-- card 5 -->
  <g>
    <rect x="960" y="150" width="200" height="170" rx="16" fill="#101725" stroke="#2A364C" stroke-width="1.5"/>
    <rect x="960" y="150" width="6" height="170" rx="3" fill="#A855F7"/>
    <circle cx="994" cy="186" r="15" fill="#A855F7"/><text x="994" y="191" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">5</text>
    <text x="1018" y="191" font-size="15.5" font-weight="700" fill="#E7EEFC">Land &amp; ship</text>
    <text x="980" y="228" font-size="12" fill="#8A97AE">Write to files, DBs, cloud</text>
    <text x="980" y="248" font-size="12" fill="#8A97AE">or vector stores. Save,</text>
    <text x="980" y="268" font-size="12" fill="#8A97AE">schedule, or build a binary.</text>
    <text x="980" y="298" font-size="11" font-weight="600" fill="#D8B4FE">one-file deploy</text>
  </g>

  <!-- ============ connectors + animated dots ============ -->
  <g stroke-linecap="round">
    <line x1="240" y1="235" x2="264" y2="235" stroke="#2A364C" stroke-width="2.5"/>
    <path d="M262 230 L270 235 L262 240 Z" fill="#3A4A66"/>
    <line x1="470" y1="235" x2="494" y2="235" stroke="#2A364C" stroke-width="2.5"/>
    <path d="M492 230 L500 235 L492 240 Z" fill="#3A4A66"/>
    <line x1="700" y1="235" x2="724" y2="235" stroke="#2A364C" stroke-width="2.5"/>
    <path d="M722 230 L730 235 L722 240 Z" fill="#3A4A66"/>
    <line x1="930" y1="235" x2="954" y2="235" stroke="#2A364C" stroke-width="2.5"/>
    <path d="M952 230 L960 235 L952 240 Z" fill="#3A4A66"/>
  </g>
  <circle r="4" fill="#2DD4BF"><animate attributeName="cx" values="240;270" dur="1.5s" repeatCount="indefinite"/><animate attributeName="cy" values="235;235" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle r="4" fill="#38BDF8"><animate attributeName="cx" values="470;500" dur="1.5s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="cy" values="235;235" dur="1.5s" begin="0.3s" repeatCount="indefinite"/></circle>
  <circle r="4" fill="#6366F1"><animate attributeName="cx" values="700;730" dur="1.5s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="cy" values="235;235" dur="1.5s" begin="0.6s" repeatCount="indefinite"/></circle>
  <circle r="4" fill="#A855F7"><animate attributeName="cx" values="930;960" dur="1.5s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="cy" values="235;235" dur="1.5s" begin="0.9s" repeatCount="indefinite"/></circle>

  <!-- ============ live preview chip (surfaces from compile + run) ============ -->
  <g>
    <rect x="500" y="370" width="430" height="46" rx="12" fill="#0E1623" stroke="#2A364C" stroke-width="1.5"/>
    <circle cx="526" cy="393" r="6" fill="#34D399"/>
    <text x="544" y="389" font-size="12.5" font-weight="700" fill="#E7EEFC">Live preview · generated SQL on every node</text>
    <text x="544" y="405" font-size="10.5" fill="#8A97AE">inspect rows + plan as you build — zero hidden state</text>
    <!-- arrows up from chip to step 3 and step 4 -->
    <line x1="600" y1="370" x2="600" y2="324" stroke="#2A364C" stroke-width="1.8" stroke-dasharray="5 5"/>
    <path d="M596 330 L600 322 L604 330 Z" fill="#3A4A66"/>
    <line x1="830" y1="370" x2="830" y2="324" stroke="#2A364C" stroke-width="1.8" stroke-dasharray="5 5"/>
    <path d="M826 330 L830 322 L834 330 Z" fill="#3A4A66"/>
  </g>
</svg>
