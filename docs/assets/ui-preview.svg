<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" fill="none" role="img" aria-label="Quilt designer - illustration">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/><stop offset="0.55" stop-color="#6366F1"/><stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0F17"/><stop offset="1" stop-color="#080B12"/>
    </linearGradient>
  </defs>
  <style>text{font-family:'Segoe UI',system-ui,Arial,sans-serif}</style>

  <rect x="1" y="1" width="1198" height="718" rx="16" fill="url(#win)" stroke="#19212F" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="1.5" y="1.5" width="1197" height="48" rx="16" fill="#0A0E18"/>
  <rect x="1.5" y="34" width="1197" height="16" fill="#0A0E18"/>
  <rect x="22" y="16" width="18" height="18" rx="6" fill="url(#g)"/>
  <text x="48" y="30" font-size="14" font-weight="800" fill="#EAF2FF">Quilt</text>
  <rect x="118" y="14" width="118" height="22" rx="11" fill="#101725" stroke="#26334B"/>
  <circle cx="132" cy="25" r="4" fill="#2DD4BF"/><text x="142" y="30" font-size="12" fill="#C4D2EC">DuckDB</text>
  <circle cx="1140" cy="25" r="6" fill="#2A3650"/><rect x="1158" y="19" width="12" height="12" fill="#2A3650"/><text x="1180" y="30" font-size="14" fill="#7A88A3">×</text>

  <!-- left palette -->
  <rect x="14" y="62" width="210" height="582" rx="12" fill="#0A0F18" stroke="#172033"/>
  <text x="32" y="92" font-size="13" font-weight="700" fill="#9FB0CC" letter-spacing="0.04em">COMPONENTS</text>
  <g>
    <rect x="28" y="108" width="182" height="40" rx="9" fill="#101725" stroke="#243149"/><rect x="28" y="108" width="4" height="40" rx="2" fill="#2DD4BF"/><text x="46" y="133" font-size="13" fill="#DBE6FB">CSV / File Source</text>
    <rect x="28" y="156" width="182" height="40" rx="9" fill="#101725" stroke="#243149"/><rect x="28" y="156" width="4" height="40" rx="2" fill="#6366F1"/><text x="46" y="181" font-size="13" fill="#DBE6FB">Filter</text>
    <rect x="28" y="204" width="182" height="40" rx="9" fill="#101725" stroke="#243149"/><rect x="28" y="204" width="4" height="40" rx="2" fill="#6366F1"/><text x="46" y="229" font-size="13" fill="#DBE6FB">Aggregate</text>
    <rect x="28" y="252" width="182" height="40" rx="9" fill="#101725" stroke="#243149"/><rect x="28" y="252" width="4" height="40" rx="2" fill="#6366F1"/><text x="46" y="277" font-size="13" fill="#DBE6FB">Join / Lookup</text>
    <rect x="28" y="300" width="182" height="40" rx="9" fill="#101725" stroke="#243149"/><rect x="28" y="300" width="4" height="40" rx="2" fill="#A855F7"/><text x="46" y="325" font-size="13" fill="#DBE6FB">Parquet Sink</text>
  </g>

  <!-- canvas -->
  <rect x="236" y="62" width="730" height="582" rx="12" fill="#080C14" stroke="#172033"/>
  <g opacity="0.5">
    <line x1="236" y1="160" x2="966" y2="160" stroke="#101725"/><line x1="236" y1="260" x2="966" y2="260" stroke="#101725"/>
    <line x1="236" y1="360" x2="966" y2="360" stroke="#101725"/><line x1="236" y1="460" x2="966" y2="460" stroke="#101725"/>
    <line x1="236" y1="560" x2="966" y2="560" stroke="#101725"/>
    <line x1="430" y1="62" x2="430" y2="644" stroke="#101725"/><line x1="620" y1="62" x2="620" y2="644" stroke="#101725"/><line x1="810" y1="62" x2="810" y2="644" stroke="#101725"/>
  </g>

  <!-- edges with flow -->
  <line x1="430" y1="330" x2="500" y2="330" stroke="#2E3C58" stroke-width="2.5"/>
  <line x1="660" y1="330" x2="730" y2="330" stroke="#2E3C58" stroke-width="2.5"/>
  <circle r="4" fill="#2DD4BF"><animate attributeName="cx" values="430;500" dur="1.4s" repeatCount="indefinite"/><animate attributeName="cy" values="330;330" dur="1.4s" repeatCount="indefinite"/></circle>
  <circle r="4" fill="#A855F7"><animate attributeName="cx" values="660;730" dur="1.4s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="cy" values="330;330" dur="1.4s" repeatCount="indefinite"/></circle>

  <!-- node: source -->
  <rect x="300" y="298" width="130" height="64" rx="13" fill="#101A2A" stroke="#2A3850" stroke-width="1.5"/>
  <rect x="300" y="298" width="5" height="64" rx="2.5" fill="#2DD4BF"/>
  <text x="320" y="328" font-size="14" font-weight="700" fill="#EAF2FF">orders.csv</text>
  <text x="320" y="347" font-size="11.5" fill="#8090AD">source</text>

  <!-- node: filter (selected) -->
  <rect x="500" y="298" width="160" height="64" rx="13" fill="#101A2A" stroke="url(#g)" stroke-width="2"/>
  <rect x="500" y="298" width="5" height="64" rx="2.5" fill="#6366F1"/>
  <text x="520" y="328" font-size="14" font-weight="700" fill="#EAF2FF">Filter</text>
  <text x="520" y="347" font-size="11.5" fill="#8FA6CC">status = 'paid'</text>

  <!-- node: sink -->
  <rect x="730" y="298" width="150" height="64" rx="13" fill="#101A2A" stroke="#2A3850" stroke-width="1.5"/>
  <rect x="730" y="298" width="5" height="64" rx="2.5" fill="#A855F7"/>
  <text x="750" y="328" font-size="14" font-weight="700" fill="#EAF2FF">clean.parquet</text>
  <text x="750" y="347" font-size="11.5" fill="#8090AD">sink</text>

  <!-- run button -->
  <rect x="846" y="80" width="100" height="34" rx="9" fill="url(#g)"/>
  <text x="896" y="102" text-anchor="middle" font-size="14" font-weight="800" fill="#06121B">▶  Run</text>

  <!-- right properties -->
  <rect x="978" y="62" width="208" height="582" rx="12" fill="#0A0F18" stroke="#172033"/>
  <text x="996" y="92" font-size="13" font-weight="700" fill="#9FB0CC" letter-spacing="0.04em">PROPERTIES - FILTER</text>
  <text x="996" y="124" font-size="12" fill="#7E8CA6">Condition</text>
  <rect x="996" y="132" width="172" height="34" rx="8" fill="#101725" stroke="#26334B"/><text x="1008" y="153" font-size="12" fill="#CFE0FF">status  =  paid</text>
  <text x="996" y="190" font-size="12" fill="#7E8CA6">Match</text>
  <rect x="996" y="198" width="172" height="34" rx="8" fill="#101725" stroke="#26334B"/><text x="1008" y="219" font-size="12" fill="#CFE0FF">All conditions (AND)</text>
  <text x="996" y="256" font-size="12" fill="#7E8CA6">Generated SQL</text>
  <rect x="996" y="264" width="172" height="48" rx="8" fill="#0A1220" stroke="#22304A"/><text x="1008" y="285" font-size="11" fill="#5EEAD4">SELECT * FROM src</text><text x="1008" y="301" font-size="11" fill="#5EEAD4">WHERE status='paid'</text>

  <!-- bottom output -->
  <rect x="236" y="600" width="730" height="44" rx="10" fill="#0A1220" stroke="#1C2A40"/>
  <circle cx="262" cy="622" r="6" fill="#34D399"/>
  <text x="278" y="627" font-size="13" font-weight="700" fill="#DFF7EE">Run succeeded</text>
  <text x="410" y="627" font-size="12.5" fill="#9FB0CC">2 rows written · 18 ms · DuckDB</text>
</svg>
