<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" preserveAspectRatio="xMidYMid meet" fill="none" role="img" aria-label="How Quilt works: sources flow into a canvas of wired nodes, compile to SQL, execute on DuckDB, and land in targets">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#0B0F17"/>
      <stop offset="1" stop-color="#070A11"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>text{font-family:'Segoe UI',system-ui,Arial,sans-serif}</style>

  <rect x="1" y="1" width="1198" height="438" rx="22" fill="url(#bg)" stroke="#19212F" stroke-width="1.5"/>
  <ellipse cx="600" cy="220" rx="500" ry="220" fill="url(#glow)"/>

  <!-- column headers -->
  <text x="40" y="44" font-size="12.5" font-weight="700" letter-spacing="0.08em" fill="#7E8AA3">SOURCES</text>
  <text x="360" y="44" font-size="12.5" font-weight="700" letter-spacing="0.08em" fill="#7E8AA3">DRAW &amp; WIRE NODES</text>
  <text x="760" y="44" font-size="12.5" font-weight="700" letter-spacing="0.08em" fill="#7E8AA3">DUCKDB ENGINE</text>
  <text x="1020" y="44" font-size="12.5" font-weight="700" letter-spacing="0.08em" fill="#7E8AA3">TARGETS</text>

  <!-- ===================== SOURCES ===================== -->
  <g>
    <rect x="40" y="70" width="200" height="34" rx="9" fill="#101725" stroke="#22304A"/><rect x="40" y="70" width="4" height="34" rx="2" fill="#2DD4BF"/><text x="58" y="92" font-size="12.5" fill="#DBE6FB">Files · CSV · Parquet</text>
    <rect x="40" y="114" width="200" height="34" rx="9" fill="#101725" stroke="#22304A"/><rect x="40" y="114" width="4" height="34" rx="2" fill="#2DD4BF"/><text x="58" y="136" font-size="12.5" fill="#DBE6FB">Databases · SQL · NoSQL</text>
    <rect x="40" y="158" width="200" height="34" rx="9" fill="#101725" stroke="#22304A"/><rect x="40" y="158" width="4" height="34" rx="2" fill="#2DD4BF"/><text x="58" y="180" font-size="12.5" fill="#DBE6FB">Cloud · S3 · GCS · Azure</text>
    <rect x="40" y="202" width="200" height="34" rx="9" fill="#101725" stroke="#22304A"/><rect x="40" y="202" width="4" height="34" rx="2" fill="#2DD4BF"/><text x="58" y="224" font-size="12.5" fill="#DBE6FB">APIs · REST · GraphQL</text>
    <rect x="40" y="246" width="200" height="34" rx="9" fill="#101725" stroke="#22304A"/><rect x="40" y="246" width="4" height="34" rx="2" fill="#2DD4BF"/><text x="58" y="268" font-size="12.5" fill="#DBE6FB">Streaming · Kafka · NATS</text>
    <text x="40" y="300" font-size="11" fill="#5E6B82">290+ connectors</text>
  </g>

  <!-- sources -> canvas connectors -->
  <g stroke="#2A364C" stroke-width="1.5" fill="none">
    <path d="M240 87 C 300 87, 300 175, 356 175"/>
    <path d="M240 131 C 300 131, 300 175, 356 175"/>
    <path d="M240 175 H 356"/>
    <path d="M240 219 C 300 219, 300 175, 356 175"/>
    <path d="M240 263 C 300 263, 300 175, 356 175"/>
  </g>
  <circle r="4" fill="#2DD4BF"><animate attributeName="cx" values="240;356" dur="1.6s" repeatCount="indefinite"/><animate attributeName="cy" values="175;175" dur="1.6s" repeatCount="indefinite"/></circle>

  <!-- ===================== CANVAS (draw & wire) ===================== -->
  <rect x="356" y="64" width="320" height="248" rx="16" fill="#080C14" stroke="#1B2740" stroke-width="1.5"/>
  <!-- canvas grid -->
  <g opacity="0.5" stroke="#101725">
    <line x1="356" y1="128" x2="676" y2="128"/><line x1="356" y1="192" x2="676" y2="192"/><line x1="356" y1="256" x2="676" y2="256"/>
    <line x1="436" y1="64" x2="436" y2="312"/><line x1="516" y1="64" x2="516" y2="312"/><line x1="596" y1="64" x2="596" y2="312"/>
  </g>

  <!-- node edges -->
  <g stroke="#2E3C58" stroke-width="2" fill="none">
    <path d="M452 130 C 486 130, 486 175, 520 175"/>
    <path d="M452 220 C 486 220, 486 175, 520 175"/>
    <line x1="600" y1="175" x2="628" y2="175"/>
  </g>
  <circle r="3.5" fill="#38BDF8"><animate attributeName="cx" values="452;520" dur="1.3s" repeatCount="indefinite"/><animate attributeName="cy" values="130;175" dur="1.3s" repeatCount="indefinite"/></circle>

  <!-- source node -->
  <rect x="388" y="108" width="64" height="44" rx="10" fill="#101A2A" stroke="#2A3850" stroke-width="1.4"/>
  <rect x="388" y="108" width="4" height="44" rx="2" fill="#2DD4BF"/>
  <text x="400" y="134" font-size="10.5" font-weight="700" fill="#E7EEFC">CSV in</text>
  <!-- second source node -->
  <rect x="388" y="198" width="64" height="44" rx="10" fill="#101A2A" stroke="#2A3850" stroke-width="1.4"/>
  <rect x="388" y="198" width="4" height="44" rx="2" fill="#2DD4BF"/>
  <text x="400" y="224" font-size="10.5" font-weight="700" fill="#E7EEFC">DB in</text>
  <!-- transform node (selected, aurora border) -->
  <rect x="520" y="151" width="80" height="48" rx="11" fill="#101A2A" stroke="url(#aurora)" stroke-width="2"/>
  <rect x="520" y="151" width="4" height="48" rx="2" fill="#6366F1"/>
  <text x="534" y="172" font-size="10.5" font-weight="700" fill="#E7EEFC">Join +</text>
  <text x="534" y="187" font-size="10.5" font-weight="700" fill="#E7EEFC">Filter</text>
  <!-- sink node -->
  <rect x="628" y="151" width="40" height="48" rx="11" fill="#101A2A" stroke="#2A3850" stroke-width="1.4"/>
  <rect x="628" y="151" width="4" height="48" rx="2" fill="#A855F7"/>
  <text x="640" y="179" font-size="10.5" font-weight="700" fill="#E7EEFC">→</text>

  <text x="372" y="298" font-size="11" fill="#5E6B82">drag · wire · preview every node</text>

  <!-- canvas -> duckdb -->
  <g stroke="#2A364C" stroke-width="1.5" fill="none"><line x1="676" y1="175" x2="752" y2="175"/></g>
  <path d="M748 170 L756 175 L748 180 Z" fill="#3A4A66"/>
  <text x="688" y="166" font-size="10" fill="#6B7790">compiles to</text>
  <text x="694" y="196" font-size="10" font-weight="700" fill="#A5B4FC">SQL</text>
  <circle r="4" fill="#6366F1"><animate attributeName="cx" values="676;752" dur="1.5s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="cy" values="175;175" dur="1.5s" begin="0.4s" repeatCount="indefinite"/></circle>

  <!-- ===================== DUCKDB ENGINE ===================== -->
  <rect x="756" y="110" width="190" height="130" rx="16" fill="#0E1623" stroke="url(#aurora)" stroke-width="2"/>
  <circle cx="800" cy="150" r="18" fill="#6366F1"/>
  <text x="800" y="156" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">D</text>
  <text x="828" y="148" font-size="15" font-weight="700" fill="#E7EEFC">DuckDB</text>
  <text x="828" y="166" font-size="11" fill="#9FB6DC">columnar engine</text>
  <text x="776" y="198" font-size="11" fill="#A9BCE0">vectorized · local</text>
  <text x="776" y="217" font-size="11" fill="#A9BCE0">native speed · offline</text>

  <!-- duckdb -> targets -->
  <g stroke="#2A364C" stroke-width="1.5" fill="none"><line x1="946" y1="175" x2="1014" y2="175"/></g>
  <path d="M1010 170 L1018 175 L1010 180 Z" fill="#3A4A66"/>
  <circle r="4" fill="#A855F7"><animate attributeName="cx" values="946;1014" dur="1.5s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="cy" values="175;175" dur="1.5s" begin="0.8s" repeatCount="indefinite"/></circle>

  <!-- ===================== TARGETS ===================== -->
  <g>
    <rect x="1014" y="92" width="150" height="34" rx="9" fill="#101725" stroke="#22304A"/><rect x="1014" y="92" width="4" height="34" rx="2" fill="#A855F7"/><text x="1032" y="114" font-size="12" fill="#DBE6FB">Files · Parquet</text>
    <rect x="1014" y="136" width="150" height="34" rx="9" fill="#101725" stroke="#22304A"/><rect x="1014" y="136" width="4" height="34" rx="2" fill="#A855F7"/><text x="1032" y="158" font-size="12" fill="#DBE6FB">Databases</text>
    <rect x="1014" y="180" width="150" height="34" rx="9" fill="#101725" stroke="#22304A"/><rect x="1014" y="180" width="4" height="34" rx="2" fill="#A855F7"/><text x="1032" y="202" font-size="12" fill="#DBE6FB">Cloud · object store</text>
    <rect x="1014" y="224" width="150" height="34" rx="9" fill="#101725" stroke="#22304A"/><rect x="1014" y="224" width="4" height="34" rx="2" fill="#38BDF8"/><text x="1032" y="246" font-size="12" fill="#DBE6FB">Vector / AI stores</text>
    <text x="1014" y="278" font-size="11" fill="#5E6B82">58 sinks · upsert · CDC</text>
  </g>

  <!-- ===================== bottom strip ===================== -->
  <line x1="40" y1="350" x2="1160" y2="350" stroke="#172033" stroke-width="1"/>
  <g>
    <circle cx="56" cy="388" r="6" fill="#34D399"/>
    <text x="72" y="384" font-size="12.5" font-weight="700" fill="#DFF7EE">Run succeeded</text>
    <text x="72" y="402" font-size="11" fill="#8A97AE">live row counts · per-stage timing · mid-query cancel · run logs</text>
  </g>
  <g>
    <rect x="470" y="372" width="220" height="32" rx="9" fill="#0E1623" stroke="#2A364C"/>
    <text x="486" y="392" font-size="11.5" fill="#A9BCE0">save · schedule · build one-file binary</text>
  </g>
  <text x="900" y="392" font-size="11" fill="#6B7790">no servers · no cloud · your machine</text>
</svg>
